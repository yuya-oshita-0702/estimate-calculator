<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>フリーランス向け見積もり計算ツール</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <h1>フリーランス向け見積もり計算ツール</h1>

  <div class="box">

    <div class="row">
      <label>報酬金額（円）</label>
      <input type="text" id="amount" placeholder="例：100000">
    </div>

    <div class="row checkbox">
      <label>
        <input type="checkbox" id="withholding">
        源泉徴収（10.21%）
      </label>
    </div>

    <div class="row checkbox">
      <label>
        <input type="checkbox" id="fee">
        システム手数料（10%）
      </label>
    </div>

    <button id="calcBtn">計算する</button>

    <p id="error" class="error"></p>

    <div class="result-box">
      <p id="result">振込金額：0円</p>
      <p id="breakdown"></p>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
